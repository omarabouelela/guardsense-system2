output_dir: artifacts/trigger_data
txt_layout: auto
normalization:
  mode: frame
  frame_width: 1920
  frame_height: 1080
temporal:
  window_size: 32
  overlap: 0.5
  short_policy: pad
split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  source_aware: true
sources:
  - name: rwf2000
    paths:
      - dataset/raw/rwf2000/pose
    label: 2
    synthetic_or_real: real
  - name: airtlab
    paths:
      - dataset/raw/airtlab/pose
    label: 0
    synthetic_or_real: real
  - name: simuletic_prefight
    paths:
      - dataset/raw/simuletic/pose
    label: 1
    synthetic_or_real: synthetic
