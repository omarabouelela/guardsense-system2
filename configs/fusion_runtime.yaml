models:
  # Required unless --dry-run
  trigger_model_path: "artifacts/runs/latest/best_model.pt"
  verifier_model_path: "artifacts/verifier_runs/latest/best_model.pt"

frigate:
  api_base_url: "http://localhost:5000"
  api_key: null
  clips_root: "/media/frigate/clips"
  recordings_root: "/media/frigate/recordings"

runtime:
  device: "auto"
  extraction_dir: "extracted_clips"
  drop_trigger_normal_early: true

thresholds:
  trigger_escalation_threshold: 0.55
  trigger_force_verify_threshold: 0.75
  trigger_normal_drop_threshold: 0.90
  verifier_fight_threshold: 0.65
  verifier_tension_threshold: 0.55
  verifier_normal_override_threshold: 0.75
  escalate_uncertain_trigger: true
  review_needed_on_missing_verifier: true

video_process:
  target_fps: 30
  target_duration_seconds: 3.0
  min_duration_seconds: 2.0
  max_duration_seconds: 4.0
  target_width: 640
  target_height: 360
  target_codec: "libx264"
  crf: 23
  preset: "fast"

verifier_inference:
  num_frames: 16
  temporal_stride: 2
