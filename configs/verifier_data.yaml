output_dir: artifacts/verifier_data

sources:
  - name: rwf2000_real
    paths: [dataset/raw/rwf2000]
    label: null
    synthetic_or_real: real
  - name: airtlab_real
    paths: [dataset/raw/airtlab]
    label: null
    synthetic_or_real: real
  - name: classroom_hard_negative
    paths: [dataset/raw/classroom_hard_negative]
    label: 0
    synthetic_or_real: real
  - name: simuletic_label1_gap_fill
    paths: [dataset/raw/simuletic/label1]
    label: 1
    synthetic_or_real: synthetic

validation:
  min_duration_seconds: 1.5
  flag_dark: true
  dark_luma_threshold: 35.0
  flag_blurry: true
  blurry_laplacian_var_threshold: 30.0

processing:
  target_fps: 30
  target_duration_seconds: 3.0
  min_duration_seconds: 2.0
  max_duration_seconds: 4.0
  target_width: 640
  target_height: 360
  target_codec: libx264
  crf: 23
  preset: fast

split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  source_aware: true
